{% extends "base.html" %}

{% block title %}Mis Asignaciones - Sistema de Inventario{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-person-badge"></i> Mis Asignaciones</h2>
    </div>

    <div class="card">
        <div class="card-body">
            <table id="tabla-mis-asignaciones" class="table table-striped table-hover" style="width:100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Material</th>
                        <th>Cantidad</th>
                        <th>Asignador</th>
                        <th>Fecha Aprobación</th>
                        <th>Observaciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/mis_asignaciones.js') }}"></script>
{% endblock %}
