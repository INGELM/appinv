{% extends "base.html" %}

{% block title %}Usuarios - Sistema de Inventario{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people"></i> Gestión de Usuarios</h2>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modalNuevoUsuario"><i class="bi bi-person-plus"></i> Nuevo Usuario</button>
    </div>

    <div class="card">
        <div class="card-body">
            <table id="tabla-usuarios" class="table table-striped" style="width:100%">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombres</th>
                        <th>Usuario</th>
                        <th>Rol</th>
                        <th>Activo</th>
                        <th>Fecha Creación</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/usuarios.js') }}"></script>
<!-- Modal Nuevo Usuario -->
<div class="modal fade" id="modalNuevoUsuario" tabindex="-1" aria-labelledby="modalNuevoUsuarioLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalNuevoUsuarioLabel">Nuevo Usuario</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="form-nuevo-usuario">
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="nu_nombres" class="form-label">Nombres *</label>
                        <input type="text" class="form-control" id="nu_nombres" required>
                    </div>
                    <div class="mb-3">
                        <label for="nu_usuario" class="form-label">Usuario *</label>
                        <input type="text" class="form-control" id="nu_usuario" required>
                    </div>
                    <div class="mb-3">
                        <label for="nu_password" class="form-label">Password *</label>
                        <input type="password" class="form-control" id="nu_password" required>
                    </div>
                    <div class="mb-3">
                        <label for="nu_rol" class="form-label">Rol *</label>
                        <select id="nu_rol" class="form-select" required>
                            <option value="Superintendente">Superintendente</option>
                            <option value="Supervisor">Supervisor</option>
                            <option value="Analista">Analista</option>
                        </select>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="nu_activo">
                        <label class="form-check-label" for="nu_activo">Activo</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Crear Usuario</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
